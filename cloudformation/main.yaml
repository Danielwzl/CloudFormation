AWSTemplateFormatVersion: "2010-09-09"
Description: >
  API Gateway + Cognito User Pool + two Lambda functions (getPrice / setPrice).
  All resources are Free Tier eligible.

# ============================================================
# Parameters
# ============================================================
Parameters:
  ProjectName:
    Type: String
    Default: price-api
    Description: Used as a prefix for all resource names.

  LambdaZipBucket:
    Type: String
    Description: >
      S3 bucket name that holds the Lambda deployment ZIPs.
      Both ZIPs must be uploaded here before deploying this stack.

# ============================================================
# Resources
# ============================================================
Resources:

  # ----------------------------------------------------------
  # Cognito User Pool
  # ----------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-user-pool"
      # Require email as the sign-in identifier
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      # Enforce a reasonably strong password policy
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      # Keep token lifetimes short for security
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-app-client"
      UserPoolId: !Ref UserPool
      # No client secret - suitable for public / mobile clients
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      # Access token is valid for 1 hour (default)
      AccessTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours

  # ----------------------------------------------------------
  # IAM role shared by both Lambda functions
  # ----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Grants CloudWatch Logs access only (principle of least privilege)
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SsmPriceAlerts
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # setPrice (lambda2) needs to write to SSM
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/price-alerts/*"

  # ----------------------------------------------------------
  # Lambda 1 - getPrice (Node.js)
  # ----------------------------------------------------------
  GetPriceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-getPrice"
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaZipBucket
        S3Key: lambda1.zip
      Environment:
        Variables:
          NODE_ENV: production

  # ----------------------------------------------------------
  # Lambda 2 - setPrice (Python)
  # ----------------------------------------------------------
  SetPriceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-setPrice"
      Runtime: python3.12
      Handler: lambda_function.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaZipBucket
        S3Key: lambda2.zip
      Environment:
        Variables:
          SSM_PREFIX: /price-alerts

  # ----------------------------------------------------------
  # API Gateway (HTTP API - cheaper and simpler than REST API)
  # ----------------------------------------------------------
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-http-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type

  # JWT Authorizer backed by the Cognito User Pool
  CognitoAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      AuthorizerType: JWT
      Name: !Sub "${ProjectName}-cognito-authorizer"
      IdentitySource:
        - "$request.header.Authorization"
      JwtConfiguration:
        Audience:
          - !Ref UserPoolClient
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  # Default stage with auto-deploy
  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  # Lambda integrations
  GetPriceIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Arn}/invocations"
        - Arn: !GetAtt GetPriceLambda.Arn
      PayloadFormatVersion: "2.0"

  SetPriceIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Arn}/invocations"
        - Arn: !GetAtt SetPriceLambda.Arn
      PayloadFormatVersion: "2.0"

  # Routes (both protected by the Cognito JWT authorizer)
  GetPriceRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /getPrice"
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub "integrations/${GetPriceIntegration}"

  SetPriceRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /setPrice"
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub "integrations/${SetPriceIntegration}"

  # Allow API Gateway to invoke the Lambda functions
  GetPriceLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt GetPriceLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/getPrice"

  SetPriceLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt SetPriceLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/setPrice"

# ============================================================
# Outputs
# ============================================================
Outputs:
  ApiEndpoint:
    Description: Base URL of the deployed HTTP API
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito App Client ID (needed to obtain tokens)
    Value: !Ref UserPoolClient
